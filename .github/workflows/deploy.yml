name: Deploy site

# Build the MkDocs site and deploy it to GitHub Pages on every push to main.
#
# One-time setup (Miguel):
#   1. Repo Settings → Pages → Build and deployment → Source: "GitHub Actions".
#   2. Repo Settings → Pages → Custom domain: enter vafricaairlines.com (this
#      also keeps docs/CNAME in sync). Then configure DNS — see README.md:
#        - apex (example.com):      A / ALIAS records to GitHub Pages IPs
#        - www  (www.example.com):  CNAME to <your-org>.github.io
#   3. Enable "Enforce HTTPS" once the certificate is issued.

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Least-privilege token: read the repo, write Pages, mint the OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Guard: fail the build if any unreplaced placeholder token slips in.
      # `mkdocs --strict` does NOT catch these, because `<token>` renders as a
      # valid relative autolink — which is exactly the dead-CTA bug this prevents.
      - name: Fail on unreplaced placeholders
        run: |
          if grep -rniE '<[A-Z_]+_URL>|vafricaairlines\.com/<|>>|<<INSERT' docs/ mkdocs.yml; then
            echo "::error::Unreplaced placeholder token found — replace it before deploying."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      # Uncomment if you enable Material's `social` plugin (Open Graph cards):
      # the card renderer needs the Cairo/Pango system libraries.
      # - name: Install social-card system dependencies
      #   run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - name: Install dependencies
        run: pip install -r requirements.txt

      # --strict fails the build on broken links or nav errors.
      - name: Build site
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
