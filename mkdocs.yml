# vAfrica Airlines — public website (Material for MkDocs)
# Scaffolding config. Placeholder tokens marked <LIKE_THIS> are Miguel's to fill in.
# See README.md for the full list of placeholders and DNS steps.

# ---------------------------------------------------------------------------
# Site metadata (SEO)
# ---------------------------------------------------------------------------
site_name: vAfrica Airlines
site_url: https://vafricaairlines.com/
site_description: >-
  vAfrica Airlines — a vAMSYS-based virtual airline. Join our community of
  flight-sim pilots and fly Africa's skies.
site_author: vAfrica Airlines
copyright: Copyright &copy; 2026 vAfrica Airlines

# Repo links (Material shows an edit/repo button). Adjust org/repo if it changes.
repo_url: https://github.com/vAfrica-Airlines/website
repo_name: vAfrica-Airlines/website
edit_uri: edit/main/docs/

# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------
theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  # Brand palette. Named swatches are the closest fallback; exact brand hex
  # values are applied via docs/assets/stylesheets/extra.css (:root tokens +
  # [data-md-color-scheme] overrides). See Github/brand/ for the system.
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Hanken Grotesk   # body / UI
    code: IBM Plex Mono    # code / callsigns / labels
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

# ---------------------------------------------------------------------------
# Navigation — the five funnel pages. `--strict` fails if any file is missing.
# ---------------------------------------------------------------------------
nav:
  - Home: index.md
  - About: about.md
  - Join: join.md
  - FAQ: faq.md
  - Contact: contact.md

# ---------------------------------------------------------------------------
# Plugins — keep minimal.
# ---------------------------------------------------------------------------
plugins:
  - search
  # Single source of truth for CTA URLs — pages reference {{ vamsys_join_url }}
  # and {{ discord_url }} (defined under `extra:` below) instead of hardcoding.
  - macros
  - minify:
      minify_html: true
  # Social cards / Open Graph images. Needs Cairo/Pango system libs in CI
  # and the pillow/cairosvg Python deps (see requirements.txt). Uncomment
  # both here and there to enable.
  # - social

# ---------------------------------------------------------------------------
# Markdown extensions
# ---------------------------------------------------------------------------
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# ---------------------------------------------------------------------------
# Extra: brand CSS + social links
# ---------------------------------------------------------------------------
extra_css:
  - assets/stylesheets/extra.css

extra:
  # ---- CTA URLs: single source of truth (used via macros in page bodies) ----
  # Update these two lines to change every "Join" button across the site.
  vamsys_join_url: "https://vamsys.io/register/vafs"
  discord_url: "https://discord.gg/JPWaZEHG4"
  social:
    # Macros do NOT expand inside mkdocs.yml, so this uses the literal URL.
    # Keep it in sync with `discord_url` above.
    - icon: fontawesome/brands/discord
      link: "https://discord.gg/JPWaZEHG4"
      name: vAfrica Airlines on Discord
  # Uncomment to disable Material's "Made with Material" footer note if desired.
  generator: true

# ---------------------------------------------------------------------------
# Strict build: broken internal links / nav errors fail the build.
# ---------------------------------------------------------------------------
strict: true
validation:
  nav:
    omitted_files: warn
    not_found: warn
  links:
    not_found: warn
    anchors: warn
